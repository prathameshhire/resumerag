[alembic]
script_location = migrations
prepend_sys_path = .

path_separator = os

# Database URL is injected programmatically by migrations/env.py, which reads
# the DATABASE_URL environment variable via app.config.get_settings().
# Do not store credentials here — this line is never read at runtime.
sqlalchemy.url = set_by_env_py

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S

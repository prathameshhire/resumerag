services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      # No fallback defaults — credentials must be set in .env (cp .env.example .env).
      # Omitting them causes docker compose to fail immediately with a clear error
      # rather than silently using a well-known default password.
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    environment:
      APP_ENV: ${APP_ENV:-development}
      FRONTEND_PORT: ${FRONTEND_PORT:-3000}
      BACKEND_PORT: ${BACKEND_PORT:-8000}
      # No fallback — DATABASE_URL must be set in .env.  The backend refuses to
      # start (ValidationError) if this variable is missing, which is intentional.
      DATABASE_URL: ${DATABASE_URL}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-sentence-transformers/all-MiniLM-L6-v2}
      EMBEDDING_DIM: ${EMBEDDING_DIM:-384}
      CHUNK_SIZE_CHARS: ${CHUNK_SIZE_CHARS:-2200}
      CHUNK_OVERLAP_CHARS: ${CHUNK_OVERLAP_CHARS:-300}
      RETRIEVAL_TOP_K: ${RETRIEVAL_TOP_K:-8}
      MAX_PROMPT_CONTEXT_CHARS: ${MAX_PROMPT_CONTEXT_CHARS:-12000}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2}
      OLLAMA_TIMEOUT_SECONDS: ${OLLAMA_TIMEOUT_SECONDS:-120}
      MAX_UPLOAD_MB: ${MAX_UPLOAD_MB:-20}
      UPLOAD_DIR: ${UPLOAD_DIR:-/app/uploads}
    # Port kept open for direct API access and alembic commands during development.
    # In production, remove this and route all traffic through the proxy service.
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./backend/app:/app/app
      - ./backend/migrations:/app/migrations
      - ./backend/alembic.ini:/app/alembic.ini
      - ./backend/pytest.ini:/app/pytest.ini
      - ./backend/tests:/app/tests
      - backend_uploads:/app/uploads
      - backend_model_cache:/root/.cache/huggingface
    depends_on:
      db:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  frontend:
    build:
      context: ./frontend
      args:
        # VITE_* variables are baked into the JS bundle at build time.
        # /api resolves to the reverse proxy's backend upstream, so the React
        # app never needs to know the backend's host or port.
        # Override with VITE_API_BASE_URL=http://localhost:8000 when running
        # the frontend locally outside Docker (npm run dev).
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
    # No ports exposed directly — access the app via the proxy on port 80.
    depends_on:
      - backend

  proxy:
    image: nginx:alpine
    ports:
      - "${PROXY_PORT:-80}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend

volumes:
  postgres_data:
  backend_uploads:
  backend_model_cache:

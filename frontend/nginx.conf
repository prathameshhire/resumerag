server {
    listen       80;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    # SPA fallback: any path not found on disk serves index.html so React
    # Router can handle client-side navigation.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Vite names hashed asset files so they can be cached indefinitely.
    location ~* \.(?:js|css|woff2?|ttf|eot|otf|ico|png|jpg|jpeg|gif|svg|webp)$ {
        expires            1y;
        add_header         Cache-Control "public, immutable";
        access_log         off;
    }
}

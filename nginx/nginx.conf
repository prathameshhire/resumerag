events {
  worker_connections 1024;
}

http {
  upstream backend {
    server backend:8000;
  }

  upstream frontend {
    server frontend:80;
  }

  server {
    listen 80;
    server_name _;

    # Block direct Prometheus metrics scrape from outside
    location /metrics {
      deny all;
    }

    # Route /api/* to the FastAPI backend, stripping the /api prefix so that
    # /api/documents/upload reaches the backend as /documents/upload.
    location /api/ {
      proxy_pass         http://backend/;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;

      # Support streaming responses (Ollama completions)
      proxy_buffering    off;
      proxy_read_timeout 180s;
    }

    # Expose the backend health check at a stable path without the /api prefix
    location /health {
      proxy_pass         http://backend/health;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    }

    # All other requests go to the React SPA served by the frontend container
    location / {
      proxy_pass         http://frontend;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    }
  }
}
